{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4 text-primary fw-bold">Register New Doctor</h3>

                <form method="POST" class="django-form">
                    {% csrf_token %}

                    <div class="form-row">
                        <label>Doctor's Full Name</label>
                        {{ form.name }}
                        <small class="text-muted mt-1 d-block">Please omit "Dr." prefix; it is added automatically in views.</small>
                    </div>

                    <div class="form-row">
                        <label>Specialization / Department</label>
                        {{ form.specialization }}
                    </div>

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            Save Doctor Profile
                        </button>
                    </div>
                </form>

            </div>
        </div>
        <div class="text-center mt-3">
            <a href="{% url 'doctor_list' %}" class="text-muted text-decoration-none">&larr; Back to Doctor List</a>
        </div>
    </div>
</div>

{% endblock %}
